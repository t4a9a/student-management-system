<!DOCTYPE html>
<html>
<head>
<title>Student Manager Final</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-family:'Segoe UI';
    transition:0.3s;
    margin:0;
}

.hidden { display:none !important; }

.dark {
    background:#121212 !important;
}

.glass {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius:15px;
    padding:20px;
}

/* ✅ FIXED LOGIN */
#loginPage {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card {
    width:320px;
    padding:30px;
    border-radius:15px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    text-align:center;
}

/* SIDEBAR */
.sidebar {
    position:fixed;
    width:220px;
    height:100vh;
    background: rgba(0,0,0,0.4);
    padding:20px;
    transition:0.3s;
    z-index:1000;
}

/* MOBILE */
@media(max-width:768px){
    .sidebar{ left:-220px; }
    .sidebar.active{ left:0; }
}

/* OVERLAY */
#overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:900;
}

/* CONTENT */
.content {
    margin-left:240px;
    padding:20px;
}

@media(max-width:768px){
    .content{ margin-left:0; }
}
</style>
</head>

<body>

<!-- ✅ IMPROVED LOGIN UI -->
<div id="loginPage">
    <div class="login-card">
        <h3 class="mb-3">🔐 Login</h3>

        <input id="username" class="form-control mt-2" placeholder="Username">
        <input id="password" type="password" class="form-control mt-2" placeholder="Password">

        <button onclick="login()" class="btn btn-success w-100 mt-3">Login</button>

        <small class="d-block mt-2 text-light">admin / admin</small>
    </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar hidden">
    <div class="d-flex justify-content-between">
        <h4>📊 Dashboard</h4>
        <button class="btn btn-light btn-sm d-md-none" onclick="toggleSidebar()">✖</button>
    </div>

    <p>Total: <span id="count">0</span></p>

    <div class="d-flex gap-2">
        <button onclick="toggleMode()" class="btn btn-light btn-sm w-100">🌙</button>
        <button onclick="logout()" class="btn btn-danger btn-sm w-100">Logout</button>
    </div>
</div>

<div id="overlay" class="hidden"></div>

<!-- MAIN -->
<div id="app" class="content hidden">

<button class="btn btn-light mb-2 d-md-none" onclick="toggleSidebar()">☰</button>

<h2>🎓 Student Manager</h2>

<div class="glass mb-3">
    <input type="hidden" id="id">

    <div class="row g-2">
        <div class="col-md-3"><input id="name" class="form-control" placeholder="Name"></div>
        <div class="col-md-2"><input id="course" class="form-control" placeholder="Course"></div>
        <div class="col-md-2"><input id="age" type="number" class="form-control" placeholder="Age"></div>
        <div class="col-md-2"><input id="phone" class="form-control" placeholder="Phone"></div>
        <div class="col-md-3"><input id="email" class="form-control" placeholder="Email"></div>

        <div class="col-12">
            <button onclick="saveStudent()" class="btn btn-success w-100">Save / Update</button>
        </div>
    </div>
</div>

<input class="form-control mb-3" id="search" placeholder="Search..." onkeyup="searchStudent()">

<div class="glass">
<table class="table text-white">
<thead>
<tr>
<th>Name</th>
<th>Course</th>
<th>Age</th>
<th>Phone</th>
<th>Email</th>
<th>Action</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

</div>

<script>
const API="http://localhost:8080/students";
let allStudents=[];

/* INIT */
window.onload=function(){
    if(localStorage.getItem("loggedIn")==="true"){
        showApp();
        loadStudents();
    }
};

/* LOGIN */
function login(){
    localStorage.setItem("loggedIn","true");
    showApp();
    loadStudents();
}

/* SHOW APP */
function showApp(){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("sidebar").classList.remove("hidden");
}

/* LOGOUT */
function logout(){
    localStorage.removeItem("loggedIn");
    location.reload();
}

/* SIDEBAR */
function toggleSidebar(){
    const s=document.getElementById("sidebar");
    const o=document.getElementById("overlay");

    if(s.classList.contains("active")){
        s.classList.remove("active");
        o.classList.add("hidden");
    } else {
        s.classList.add("active");
        o.classList.remove("hidden");
    }
}

/* OUTSIDE CLICK */
document.getElementById("overlay").onclick=function(){
    document.getElementById("sidebar").classList.remove("active");
    this.classList.add("hidden");
};

/* DARK MODE */
function toggleMode(){
    document.body.classList.toggle("dark");
}

/* LOAD */
function loadStudents(){
    fetch(API)
    .then(res=>res.json())
    .then(data=>{
        allStudents=data;
        display(data);
        document.getElementById("count").innerText=data.length;
    });
}

/* DISPLAY */
function display(data){
    const list=document.getElementById("list");
    list.innerHTML="";

    data.forEach(s=>{
        list.innerHTML+=`
        <tr>
        <td>${s.name}</td>
        <td>${s.course}</td>
        <td>${s.age || "-"}</td>
        <td>${s.phone || "-"}</td>
        <td>${s.email || "-"}</td>
        <td>
            <button class="btn btn-warning btn-sm" onclick="edit(${s.id},'${s.name}','${s.course}','${s.age}','${s.phone}','${s.email}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="del(${s.id})">Delete</button>
        </td>
        </tr>`;
    });
}

/* EDIT */
function edit(id,name,course,age,phone,email){
    document.getElementById("id").value=id;
    document.getElementById("name").value=name;
    document.getElementById("course").value=course;
    document.getElementById("age").value=age;
    document.getElementById("phone").value=phone;
    document.getElementById("email").value=email;
}

/* VALIDATION */
function validate(name,age,phone,email){
    if(name.length<3) return "Name too short";
    if(age<1 || age>100) return "Invalid age";
    if(!/^[0-9]{10}$/.test(phone)) return "Phone must be 10 digits";
    if(!/^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(email)) return "Invalid email";
    return null;
}

/* SAVE */
function saveStudent(){
    const id=document.getElementById("id").value;
    const name=document.getElementById("name").value;
    const course=document.getElementById("course").value;
    const age=document.getElementById("age").value;
    const phone=document.getElementById("phone").value;
    const email=document.getElementById("email").value;

    const error=validate(name,age,phone,email);
    if(error){ alert(error); return; }

    const student={name,course,age,phone,email};

    if(id){
        fetch(API+"/"+id,{
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(student)
        }).then(()=>{
            loadStudents();
            resetForm();
        });
    } else {
        fetch(API,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(student)
        }).then(()=>{
            loadStudents();
            resetForm();
        });
    }
}

/* RESET */
function resetForm(){
    document.getElementById("id").value="";
    document.getElementById("name").value="";
    document.getElementById("course").value="";
    document.getElementById("age").value="";
    document.getElementById("phone").value="";
    document.getElementById("email").value="";
}

/* DELETE */
function del(id){
    fetch(API+"/"+id,{method:"DELETE"}).then(loadStudents);
}

/* SEARCH */
function searchStudent(){
    const val=document.getElementById("search").value.toLowerCase();
    display(allStudents.filter(s=>s.name.toLowerCase().includes(val)));
}
</script>

</body>
</html>
